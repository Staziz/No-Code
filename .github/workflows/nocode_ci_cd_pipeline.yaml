name: NoCode Automated Build

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  generate_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate Code via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c '
          import os
          import json
          import urllib.request
          import re
          
          # Read the specification
          with open("README.md", "r") as f:
              readme_content = f.read()
              
          api_key = os.environ.get("GITHUB_TOKEN")
          if not api_key:
              print("Error: GITHUB_TOKEN not found.")
              exit(1)
              
          url = "https://models.github.ai/inference/chat/completions"
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json",
              "Accept": "application/json"
          }
          
          data = {
              "model": "openai/gpt-4o",
              "messages": [
                  {"role": "system", "content": "You are an automated compiler. You take requirements and output ONLY raw HTML code. Do not wrap in markdown blocks. No conversational text."},
                  {"role": "user", "content": readme_content}
              ]
          }
          
          req = urllib.request.Request(url, data=json.dumps(data).encode("utf-8"), headers=headers)
          try:
              with urllib.request.urlopen(req) as response:
                  res_data = json.loads(response.read().decode("utf-8"))
                  generated_text = res_data["choices"][0]["message"]["content"]
                  
                  # Strip markdown block wrappers if the model hallucinates them
                  cleaned = re.sub(r"^```html\s*", "", generated_text, flags=re.MULTILINE)
                  cleaned = re.sub(r"^```\s*$", "", cleaned, flags=re.MULTILINE)
                  
                  with open("index.html", "w") as out_f:
                      out_f.write(cleaned.strip())
          except urllib.error.HTTPError as e:
              print(f"API Request failed with status {e.code}: {e.read().decode()}")
              exit(1)
          except Exception as e:
              print(f"API Request failed: {e}")
              exit(1)
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated index.html from README.md [skip ci]"
          git push